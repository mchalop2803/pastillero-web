<div class="register-container">

  <div class="register-card">

    <div class="logo">
      💊 <span>Pastillero</span>
    </div>

    <p class="subtitle">Crea tu cuenta</p>

    <!-- Nombre -->
    <label>Nombre</label>
    <input
      type="text"
      [(ngModel)]="name"
      [class.input-error]="errors.name"
    />
    <p class="field-error" *ngIf="errors.name">
      {{ errors.name }}
    </p>

    <!-- Apellidos -->
    <label>Apellidos</label>
    <input
      type="text"
      [(ngModel)]="surname"
      [class.input-error]="errors.surname"
    />
    <p class="field-error" *ngIf="errors.surname">
      {{ errors.surname }}
    </p>

    <!-- Email -->
    <label>Email</label>
    <input
      type="email"
      [(ngModel)]="email"
      [class.input-error]="errors.email"
    />
    <p class="field-error" *ngIf="errors.email">
      {{ errors.email }}
    </p>

    <!-- Password -->
    <label>Contraseña</label>
    <input
      type="password"
      [(ngModel)]="password"
      [class.input-error]="errors.password"
    />
    <p class="field-error" *ngIf="errors.password">
      {{ errors.password }}
    </p>

    <!-- DNI -->
    <label>DNI</label>
    <input
      type="text"
      [(ngModel)]="nif"
      [class.input-error]="errors.nif"
    />
    <p class="field-error" *ngIf="errors.nif">
      {{ errors.nif }}
    </p>

    <!-- Teléfono -->
    <label>Teléfono</label>
    <input
      type="text"
      [(ngModel)]="phone"
      [class.input-error]="errors.phone"
    />
    <p class="field-error" *ngIf="errors.phone">
      {{ errors.phone }}
    </p>

    <!-- Edad -->
    <label>Edad</label>
    <input
      type="number"
      [(ngModel)]="age"
      [class.input-error]="errors.age"
    />
    <p class="field-error" *ngIf="errors.age">
      {{ errors.age }}
    </p>

    <!-- BOTÓN CORREGIDO -->
    <button
      type="button"
      (click)="register()"
      [disabled]="loading"
    >
      Registrar
    </button>

      <span *ngIf="!loading">
        Registrar
      </span>

      <span *ngIf="loading">
        Creando...
      </span>

    </button>

    <p class="login-link">
      ¿Ya tienes una cuenta?
      <span (click)="goToLogin()">
        Iniciar sesión
      </span>
    </p>

  </div>

</div>
