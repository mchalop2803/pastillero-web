<div class="page">

  <header class="header">
    <h1>💊 Medicamentos</h1>
  </header>

  <!-- GRID -->
  <div class="grid">

    <div *ngFor="let med of medicaments$ | async"
         class="card"
         (click)="openDetail(med)">

      <img [src]="med.imageUrl || 'assets/default.png'">

      <h3>{{ med.nombre }}</h3>

    </div>

  </div>

  <!-- DETAIL MODAL -->
  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'medication'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)"
    (edit)="editFromModal($event)"
    (addAlert)="openAlertModal($event)">
  </app-detail-modal>

</div>
