<div class="page">

  <header class="header">
    <h1>📅 Calendario de medicación</h1>
  </header>

  <!-- ========================= -->
  <!-- CALENDARIO -->
  <!-- ========================= -->

  <div class="calendar">

    <div class="day"
         *ngFor="let d of calendarDays$ | async"
         (click)="selectDay(d)"
         [class.ok]="d.status === 'OK'"
         [class.warn]="d.status === 'WARN'"
         [class.pending]="d.status === 'PENDING'">

      <h3>{{ d.day | date:'dd/MM' }}</h3>

      <small>
        {{ d.items.length }} alarmas
      </small>

    </div>

  </div>

  <!-- ========================= -->
  <!-- DETALLE DEL DÍA -->
  <!-- ========================= -->

  <div class="day-detail" *ngIf="selectedDay">

    <h2>Alarmas del día</h2>

    <div *ngFor="let item of (calendarDays$ | async)
                      ?.find(d => d.day === selectedDay)?.items"
         class="alarm-card"
         (click)="openDetail(item)">

      <div>
        💊 {{ item.medicament?.nombre }}
      </div>

      <div>
        {{ item.estado }}
      </div>

    </div>

  </div>

  <!-- MODAL -->
  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()">
  </app-detail-modal>

</div>
