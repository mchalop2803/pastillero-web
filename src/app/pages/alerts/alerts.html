<div class="page">

  <header class="header">
    <h1>⏰ Alarmas</h1>

    <!-- SOLO BOTÓN LIMPIO -->
    <button class="add-btn" (click)="openCreateModal()">
      ➕ Crear alarma
    </button>
  </header>

  <!-- LISTA -->
  <div class="grid">

    <div class="card small"
         *ngFor="let alert of alerts$ | async"
         (click)="openDetail(alert)">

      <div class="icon">⏰</div>

      <div class="info">
        <h3>{{ alert.nombre }}</h3>

        <p>{{ alert.hora | date:'dd/MM HH:mm' }}</p>

        <span class="status">{{ alert.estado }}</span>
      </div>

    </div>
  </div>

  <!-- DETAIL -->
  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)"
    (taken)="takenAlert($event)"
    (missed)="missedAlert($event)">
  </app-detail-modal>

</div>
