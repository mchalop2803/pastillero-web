<div class="page">

  <header class="header">
    <h1>⏰ Alarma</h1>
    <p>Recordatorios de medicamentos generados automáticamente</p>
  </header>

  <div class="grid">

    <div *ngFor="let alert of alerts$ | async"
         class="card"
         (click)="openDetail(alert)">

      <div class="icon">⏰</div>

      <div class="info">

        <h3>{{ alert.nombre }}</h3>

        <p *ngIf="alert.hora">
          📅 {{ alert.hora | date:'dd/MM/yyyy HH:mm' }}
        </p>

        <small class="status"
          [class.pending]="alert.estado === 'PENDIENTE'"
          [class.taken]="alert.estado === 'TOMADA'"
          [class.missed]="alert.estado === 'PERDIDA'">

          {{ alert.estado }}

        </small>

      </div>

      <span class="badge" *ngIf="alert.medicamentoId">
        Auto
      </span>

    </div>

  </div>

  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)"
    (taken)="takenAlert($event)"
    (missed)="missedAlert($event)">
  </app-detail-modal>

</div>
