<div class="page">

  <header class="header">
    <h1>⏰ Alarmas</h1>

    <!-- 🔥 BOTÓN ESTILO ANDROID -->
    <button class="add-btn" (click)="openCreateModal()">
      ➕ Crear alarma
    </button>
  </header>

  <!-- ========================= -->
  <!-- LISTA -->
  <!-- ========================= -->

  <div class="grid">

    <div *ngFor="let alert of alerts$ | async"
         class="card"
         (click)="openDetail(alert)">

      <div class="icon">⏰</div>

      <div class="info">
        <h3>{{ alert.nombre }}</h3>

        <p>
          {{ alert.hora | date:'dd/MM/yyyy HH:mm' }}
        </p>

        <span>{{ alert.estado }}</span>
      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- MODAL CREATE (NUEVO BONITO) -->
  <!-- ========================= -->

  <div class="modal" *ngIf="isCreateOpen">
    <div class="modal-content">

      <h2>
        Crear alarma para {{ selectedMedicament?.nombre }}
      </h2>

      <input type="time" [(ngModel)]="newAlert.hora">

      <input type="text"
             placeholder="Dosis"
             [(ngModel)]="newAlert.dosisBase">

      <select [(ngModel)]="newAlert.frecuencia">
        <option>Cada 24 horas</option>
        <option>Cada 12 horas</option>
        <option>Cada 8 horas</option>
        <option>Cada 6 horas</option>
      </select>

      <div class="actions">

        <button class="add" (click)="createAlertsFromMedicament()">
          Guardar
        </button>

        <button class="cancel" (click)="closeCreateModal()">
          Cancelar
        </button>

      </div>

    </div>
  </div>

  <!-- ========================= -->
  <!-- DETAIL -->
  <!-- ========================= -->

  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)"
    (taken)="takenAlert($event)"
    (missed)="missedAlert($event)">
  </app-detail-modal>

</div>
