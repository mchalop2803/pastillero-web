<div class="page">

  <header class="header">
    <h1>⏰ Alarmas</h1>
  </header>

  <!-- FILTROS -->
  <div class="filters">

    <!-- MEDICAMENTO -->
    <select
      [(ngModel)]="selectedMedicamento"
      (change)="applyFilters()">

      <option value="Todos">Todos</option>

      <option
        *ngFor="let med of medicamentos"
        [value]="med">

        {{ med }}
      </option>
    </select>

    <!-- FECHA INICIO -->
    <input
      type="date"
      [(ngModel)]="fechaInicio"
      (change)="onFechaInicioChange()" />

    <!-- FECHA FIN -->
    <input
      type="date"
      [(ngModel)]="fechaFin"
      [min]="fechaInicio"
      (change)="applyFilters()" />

  </div>

  <!-- LISTA -->
  <div class="grid">

    <div class="card small"
         *ngFor="let alert of filteredAlerts"
         (click)="openDetail(alert)">

      <div class="icon">⏰</div>

      <div class="info">
        <h3>{{ alert.nombre }}</h3>

        <p>{{ alert.hora | date:'dd/MM HH:mm' }}</p>

        <span class="status">{{ alert.estado }}</span>
      </div>

    </div>
  </div>

  <!-- DETAIL -->
  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)"
    (taken)="takenAlert($event)"
    (missed)="missedAlert($event)">
  </app-detail-modal>

</div>
