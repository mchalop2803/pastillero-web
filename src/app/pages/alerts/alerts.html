<div class="page">

  <header class="header">
    <h1>⏰ Alerts</h1>
    <p>Medication reminders generated automatically</p>
  </header>

  <div class="grid">

    <div *ngFor="let alert of alerts$ | async"
         class="card"
         (click)="openDetail(alert)">

      <div class="icon">⏰</div>

      <div class="info">
        <h3>{{ alert.nombre }}</h3>
        <p *ngIf="alert.hora">🕒 {{ alert.hora }}</p>
      </div>

      <span class="badge" *ngIf="alert.medicamentId">
        Auto
      </span>

    </div>

  </div>

  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)">
  </app-detail-modal>

</div>
