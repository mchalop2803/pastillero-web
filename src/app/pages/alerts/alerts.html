<div class="page">

  <header class="header">
    <h1>⏰ Alarmas</h1>
  </header>

  <!-- 🔥 CALENDARIO DE CREACIÓN (COMO ANTES) -->
  <div *ngIf="selectedMedicament" class="create-box">

    <h2>Crear alarma para {{ selectedMedicament.nombre }}</h2>

    <input type="time" [(ngModel)]="newAlert.hora">

    <input type="text" placeholder="Dosis" [(ngModel)]="newAlert.dosisBase">

    <select [(ngModel)]="newAlert.frecuencia">
      <option>Cada 24 horas</option>
      <option>Cada 12 horas</option>
      <option>Cada 8 horas</option>
      <option>Cada 6 horas</option>
    </select>

    <button (click)="createAlertsFromMedicament()">
      Crear alarmas
    </button>

  </div>

  <!-- LISTA -->
  <div class="grid">

    <div *ngFor="let alert of alerts$ | async"
         class="card"
         (click)="openDetail(alert)">

      <div class="icon">⏰</div>

      <h3>{{ alert.nombre }}</h3>

      <p>{{ alert.hora | date:'dd/MM/yyyy HH:mm' }}</p>

      <span>{{ alert.estado }}</span>

    </div>

  </div>

  <!-- DETAIL -->
  <app-detail-modal
    [visible]="isDetailOpen"
    [item]="selectedItem"
    [type]="'alert'"
    (close)="closeDetail()"
    (delete)="deleteFromModal($event)"
    (taken)="takenAlert($event)"
    (missed)="missedAlert($event)">
  </app-detail-modal>

</div>
