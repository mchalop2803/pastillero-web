<div class="modal" *ngIf="visible" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <!-- CLOSE ICON -->
    <button class="icon-close" (click)="closeModal()">✕</button>

    <h2>{{ item?.nombre || item?.descripcion }}</h2>

    <div class="detail">

      <p *ngIf="item?.dosis">
        💊 <strong>Dose:</strong> {{ item.dosis }}
      </p>

      <p *ngIf="item?.horario">
        🕒 <strong>Time:</strong> {{ item.horario }}
      </p>

      <p *ngIf="item?.hora">
        ⏰ <strong>Hour:</strong> {{ item.hora }}
      </p>

      <p *ngIf="item?.momentDay">
        📅 <strong>Moment:</strong>
        <span *ngIf="item.momentDay === 'DAY' || item.momentDay === 'DIA'">🌅 Day</span>
        <span *ngIf="item.momentDay === 'AFTERNOON' || item.momentDay === 'TARDE'">🌇 Afternoon</span>
        <span *ngIf="item.momentDay === 'NIGHT' || item.momentDay === 'NOCHE'">🌙 Night</span>
      </p>

    </div>

    <div class="actions">

      <button
        *ngIf="type !== 'alert'"
        class="add"
        (click)="editItem()">
        ✏️ Edit
      </button>

      <button class="delete" (click)="deleteItem()">
        🗑 Delete
      </button>

    </div>

    <button class="close" (click)="closeModal()">
      Close
    </button>

  </div>
</div>
