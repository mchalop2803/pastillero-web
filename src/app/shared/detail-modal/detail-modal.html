<div class="modal" *ngIf="visible">
  <div class="modal-content">

    <h2>{{ item?.nombre || item?.descripcion }}</h2>

    <div class="detail">

      <p *ngIf="item?.dosis">
        💊 <strong>Dosis:</strong> {{ item.dosis }}
      </p>

      <p *ngIf="item?.horario">
        🕒 <strong>Hora:</strong> {{ item.horario }}
      </p>

      <p *ngIf="item?.hora">
        ⏰ <strong>Hora:</strong> {{ item.hora }}
      </p>

      <p *ngIf="momentoNormalizado">
        📅 <strong>Momento del día:</strong>

        <span *ngIf="momentoNormalizado === 'MAÑANA'">🌅 Mañana</span>
        <span *ngIf="momentoNormalizado === 'TARDE'">🌇 Tarde</span>
        <span *ngIf="momentoNormalizado === 'NOCHE'">🌙 Noche</span>
      </p>

    </div>

    <div class="actions">

      <button
        *ngIf="type !== 'alert'"
        class="add"
        (click)="editItem()">
        ✏️ Editar
      </button>

      <button class="delete" (click)="deleteItem()">
        🗑 Eliminar
      </button>

      <button class="close" (click)="closeModal()">
        Cerrar
      </button>

    </div>

  </div>
</div>
