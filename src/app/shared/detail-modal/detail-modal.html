<div
  class="overlay"
  *ngIf="visible"
  (click)="closeModal()"
>

  <div
    class="panel"
    (click)="$event.stopPropagation()"
  >

    <!-- HEADER -->
    <div class="header">

      <div class="title">
        <h1>{{ item?.nombre || item?.descripcion }}</h1>

        <p class="subtitle">
          {{ type === 'medication' ? 'Medicamento' :
             type === 'cita' ? 'Cita médica' :
             type === 'alert' ? 'Alerta' : 'Detalle' }}
        </p>

      </div>

      <button class="close-btn" (click)="closeModal()">✕</button>

    </div>

    <!-- BODY -->
    <div class="content">

      <div class="grid">

        <div class="card" *ngIf="item?.dosis">
          <div class="icon">💊</div>
          <div>
            <span class="label">Dosis</span>
            <span class="value">{{ item.dosis }}</span>
          </div>
        </div>

        <div class="card" *ngIf="item?.horario || item?.hora">
          <div class="icon">🕒</div>
          <div>
            <span class="label">Hora</span>
            <span class="value">{{ item.horario || item.hora }}</span>
          </div>
        </div>

        <div class="card" *ngIf="momentoNormalizado">
          <div class="icon">📅</div>
          <div>
            <span class="label">Momento del día</span>

            <span class="value">
              <ng-container [ngSwitch]="momentoNormalizado">
                <span *ngSwitchCase="'MAÑANA'">Mañana</span>
                <span *ngSwitchCase="'TARDE'">Tarde</span>
                <span *ngSwitchCase="'NOCHE'">Noche</span>
                <span *ngSwitchDefault>{{ momentoNormalizado }}</span>
              </ng-container>
            </span>

          </div>
        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">

      <button
        *ngIf="type !== 'alert'"
        class="btn"
        (click)="editItem()">
        ✏️ Editar
      </button>

      <button class="btn danger" (click)="deleteItem()">
        🗑 Eliminar
      </button>

      <button class="btn secondary" (click)="closeModal()">
        Cerrar
      </button>

    </div>

  </div>

</div>
