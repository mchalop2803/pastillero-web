<div class="modal" *ngIf="visible">
  <div class="modal-backdrop" (click)="closeModal()"></div>

  <div class="modal-panel">

    <!-- HEADER -->
    <div class="modal-header">
      <h2>
        {{ item?.nombre || item?.descripcion }}
      </h2>

      <button class="icon-close" (click)="closeModal()">✕</button>
    </div>

    <!-- BODY -->
    <div class="modal-body">

      <div class="info-grid">

        <div class="card" *ngIf="item?.dosis">
          <span class="label">💊 Dosis</span>
          <span class="value">{{ item.dosis }}</span>
        </div>

        <div class="card" *ngIf="item?.horario || item?.hora">
          <span class="label">🕒 Hora</span>
          <span class="value">{{ item.horario || item.hora }}</span>
        </div>

        <div class="card" *ngIf="momentoNormalizado">
          <span class="label">📅 Momento del día</span>

          <span class="value">
            <ng-container [ngSwitch]="momentoNormalizado">

              <span *ngSwitchCase="'MAÑANA'">🌅 Mañana</span>
              <span *ngSwitchCase="'TARDE'">🌇 Tarde</span>
              <span *ngSwitchCase="'NOCHE'">🌙 Noche</span>

              <span *ngSwitchDefault>{{ momentoNormalizado }}</span>

            </ng-container>
          </span>

        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer">

      <button
        *ngIf="type !== 'alert'"
        class="btn edit"
        (click)="editItem()">
        ✏️ Editar
      </button>

      <button class="btn delete" (click)="deleteItem()">
        🗑 Eliminar
      </button>

      <button class="btn close" (click)="closeModal()">
        Cerrar
      </button>

    </div>

  </div>
</div>
