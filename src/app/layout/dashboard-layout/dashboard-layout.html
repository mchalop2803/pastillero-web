<div class="layout">

  <button class="menu-btn" (click)="toggleSidebar()">
    ☰
  </button>

  <aside class="sidebar" [class.open]="isSidebarOpen">
    <h2>💊 Pastillero Digital</h2>

    <nav>
      <a routerLink="/home" routerLinkActive="active">🏠 Home</a>
      <a routerLink="/medications" routerLinkActive="active">💊 Medications</a>
      <a routerLink="/citas" routerLinkActive="active">🏥 Appointments</a>
      <a routerLink="/alerts" routerLinkActive="active">⏰ Alerts</a>
    </nav>

    <div class="bottom">
      <button (click)="logout()">🚪 Logout</button>
    </div>
  </aside>

  <div class="overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

</div>
